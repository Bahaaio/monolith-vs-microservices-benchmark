server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:productdb}
    username: ${DB_USER:benchmark}
    password: ${DB_PASSWORD:benchmark}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 2000
  jpa:
    hibernate:
      ddl-auto: validate

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: WARN
    com.github.Bahaaio: INFO

chaos:
  enabled: ${CHAOS_ENABLED:false}
  mode: ${CHAOS_MODE:none}
  fault-percent: ${CHAOS_FAULT_PERCENT:0}
  latency-ms: ${CHAOS_LATENCY_MS:0}
