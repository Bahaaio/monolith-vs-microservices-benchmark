server:
  port: 8080

spring:
  application:
    name: monolith-benchmark
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:benchmarkdb}
    username: ${DB_USER:benchmark}
    password: ${DB_PASSWORD:benchmark}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
  jpa:
    hibernate:
      ddl-auto: validate

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: WARN
    com.github.Bahaaio: INFO

chaos:
  enabled: ${CHAOS_ENABLED:false}
  mode: ${CHAOS_MODE:none}
  fault-percent: ${CHAOS_FAULT_PERCENT:0}
  latency-ms: ${CHAOS_LATENCY_MS:0}
